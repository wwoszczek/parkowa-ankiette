# Time config for games

# ===== GAMES SCHEDULE =====
game:
  day: 2  # day of the week (0=monday, 1=tuesday, ..., 6=sunday)
  hour: 18
  minute: 30

# ===== SIGNUP OPENING =====
signup:
  day: 6  # sunday
  hour: 10
  minute: 0

# ===== DRAW TEAMS =====
draw:
  day: 2  # wednesday
  hour: 8
  minute: 0

# ===== GUESTS =====
# Signed-in users can add this many guests (friends without an account).
guests:
  max_per_user: 5

# ===== TEAMS CONFIGURATION =====
# Configuration for automatic team drawing for different player counts
teams:
  12:
    count: 2
    colors: ["czerwona", "czarna"]
    players_per_team: [6, 6]

  14:
    count: 2
    colors: ["czerwona", "czarna"]
    players_per_team: [7, 7]

  18:
    count: 3
    colors: ["biała", "czerwona", "czarna"]
    players_per_team: [6, 6, 6]

# ===== MESSAGES =====
messages:
  manual_draw: "**LOSOWANIE MUSI ODBYĆ SIĘ RĘCZNIE, NIETYPOWA LICZBA UCZESTNIKÓW**"

# DAY NAMES (nominative + accusative, e.g. "w środę")
day_names: ["poniedziałek", "wtorek", "środa", "czwartek", "piątek", "sobota", "niedziela"]
day_names_accusative: ["poniedziałek", "wtorek", "środę", "czwartek", "piątek", "sobotę", "niedzielę"]
